services:
  nginx:
    image: nginx:latest
    container_name: docintel-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  api:
    build: .
    container_name: docintel-api-prod
    env_file: 
      - .env.production
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    container_name: docintel-worker-prod
    env_file: 
      - .env.production
    command: >
      celery -A app.workers.tasks worker --loglevel=info

  redis:
    image: redis:7
    container_name: docintel-redis-prod
    